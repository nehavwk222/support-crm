<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SupportDesk — Customer Ticket CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f12;
      --surface: #16181d;
      --surface-2: #1e2028;
      --border: #2a2d36;
      --border-2: #343844;
      --text: #e8eaf0;
      --text-2: #9098b0;
      --text-3: #585e72;
      --accent: #4f8ef7;
      --accent-dim: #1e3460;
      --green: #3ecf8e;
      --green-dim: #0d2e1f;
      --amber: #f5a623;
      --amber-dim: #2e1f00;
      --red: #f56060;
      --red-dim: #2e0f0f;
      --radius: 10px;
      --radius-sm: 6px;
    }

    html { font-size: 15px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 230px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .logo {
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
      font-size: 16px;
    }
    .logo h1 { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
    .logo p { font-size: 0.75rem; color: var(--text-3); margin-top: 1px; }

    .nav { padding: 0 10px; flex: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 2px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text); }
    .nav-item.active { background: var(--accent-dim); color: var(--accent); }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; }

    .nav-section-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      padding: 16px 22px 6px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-left: auto;
    }
    .dot-open { background: var(--accent); }
    .dot-progress { background: var(--amber); }
    .dot-closed { background: var(--green); }

    /* ── Main ── */
    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    .topbar {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .search-wrap {
      flex: 1;
      position: relative;
      max-width: 420px;
    }
    .search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      font-size: 14px;
    }
    .search-input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-3); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6ba3ff; }
    .btn-ghost { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); color: var(--text); }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid #4a1515; }
    .btn-danger:hover { background: #3a1010; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

    /* ── Content ── */
    .content { padding: 28px; flex: 1; overflow-y: auto; }

    /* ── Stats Row ── */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .stat-label { font-size: 0.75rem; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat-value { font-size: 1.75rem; font-weight: 600; font-family: 'DM Mono', monospace; }
    .stat-value.blue { color: var(--accent); }
    .stat-value.amber { color: var(--amber); }
    .stat-value.green { color: var(--green); }
    .stat-value.white { color: var(--text); }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      transition: all 0.15s;
      font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--border-2); color: var(--text); }
    .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { border-bottom: 1px solid var(--border); }
    th {
      padding: 11px 16px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
    }
    td {
      padding: 14px 16px;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.1s; cursor: pointer; }
    tbody tr:hover { background: var(--surface-2); }

    .ticket-id {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 500;
    }
    .customer-name { font-weight: 500; color: var(--text); }
    .customer-email { font-size: 0.78rem; color: var(--text-3); margin-top: 1px; }
    .subject-cell { max-width: 280px; }
    .subject-text { font-weight: 500; }
    .date-text { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--text-3); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .badge-open { background: var(--accent-dim); color: var(--accent); border: 1px solid #1a3a70; }
    .badge-open::before { background: var(--accent); }
    .badge-progress { background: var(--amber-dim); color: var(--amber); border: 1px solid #3a2500; }
    .badge-progress::before { background: var(--amber); }
    .badge-closed { background: var(--green-dim); color: var(--green); border: 1px solid #0a2a1a; }
    .badge-closed::before { background: var(--green); }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-3);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
    .empty-title { font-size: 1rem; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }
    .empty p { font-size: 0.875rem; }

    /* ── Page heading ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-title { font-size: 1.2rem; font-weight: 600; letter-spacing: -0.01em; }
    .page-subtitle { font-size: 0.8rem; color: var(--text-3); margin-top: 2px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s;
    }
    @keyframes fadeIn { from { opacity: 0; } }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.2s;
    }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } }
    .modal-header {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 1rem; font-weight: 600; }
    .modal-close {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: none;
      background: var(--surface-2);
      color: var(--text-2);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { background: var(--border); color: var(--text); }
    .modal-body { padding: 20px 24px 24px; }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-2);
      margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 90px; }
    select option { background: var(--surface-2); }

    .form-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding-top: 6px;
    }

    /* ── Ticket Detail ── */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .detail-field {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }
    .detail-label { font-size: 0.72rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 600; }
    .detail-value { font-size: 0.875rem; font-weight: 500; }
    .detail-value.mono { font-family: 'DM Mono', monospace; color: var(--accent); }

    .desc-block {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin-bottom: 20px;
    }
    .desc-block .detail-label { margin-bottom: 8px; }
    .desc-text { font-size: 0.875rem; line-height: 1.7; color: var(--text-2); white-space: pre-wrap; }

    .notes-section { margin-bottom: 20px; }
    .notes-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; color: var(--text-2); }
    .note-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .note-text { font-size: 0.875rem; color: var(--text); margin-bottom: 4px; }
    .note-meta { font-size: 0.75rem; color: var(--text-3); font-family: 'DM Mono', monospace; }

    .update-form {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
    }
    .update-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; color: var(--text-2); }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 12px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      animation: toastIn 0.25s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      max-width: 320px;
    }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
    @keyframes toastIn { from { transform: translateX(24px); opacity: 0; } }

    /* ── Loading ── */
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .stats { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      th.hide-sm, td.hide-sm { display: none; }
      .topbar { padding: 14px 16px; }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🎧</div>
      <h1>SupportDesk</h1>
      <p>CRM Platform</p>
    </div>
    <nav class="nav">
      <div class="nav-section-label">Workspace</div>
      <button class="nav-item active" onclick="showView('tickets')">
        <span class="nav-icon">🎫</span> All Tickets
      </button>
      <button class="nav-item" onclick="showView('new')">
        <span class="nav-icon">✚</span> New Ticket
      </button>
      <div class="nav-section-label">Filter By Status</div>
      <button class="nav-item" onclick="filterByStatus('Open')">
        <span class="nav-icon">🔵</span> Open
        <span class="status-dot dot-open"></span>
      </button>
      <button class="nav-item" onclick="filterByStatus('In Progress')">
        <span class="nav-icon">🟡</span> In Progress
        <span class="status-dot dot-progress"></span>
      </button>
      <button class="nav-item" onclick="filterByStatus('Closed')">
        <span class="nav-icon">🟢</span> Closed
        <span class="status-dot dot-closed"></span>
      </button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="Search tickets, customers, IDs…"
          oninput="onSearch(this.value)"
        />
      </div>
      <button class="btn btn-primary" onclick="showView('new')">+ New Ticket</button>
    </div>

    <!-- Content -->
    <div class="content" id="content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Modal overlay -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modalBox" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
  const API = '';  // same-origin
  let allTickets = [];
  let currentFilter = 'All';
  let searchDebounce = null;

  // ── Utilities ─────────────────────────────────────────────────────────────

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })
      + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  function statusBadge(status) {
    const map = { 'Open': 'badge-open', 'In Progress': 'badge-progress', 'Closed': 'badge-closed' };
    return `<span class="badge ${map[status] || 'badge-open'}">${status}</span>`;
  }

  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  // ── Views ──────────────────────────────────────────────────────────────────

  async function showView(view) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    if (view === 'tickets') {
      document.querySelector('.nav-item').classList.add('active');
      await loadTickets();
    } else if (view === 'new') {
      document.querySelectorAll('.nav-item')[1].classList.add('active');
      renderNewTicketView();
    }
  }

  async function filterByStatus(status) {
    currentFilter = status;
    document.getElementById('searchInput').value = '';
    await loadTickets({ status });
  }

  function onSearch(value) {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      currentFilter = 'All';
      loadTickets({ search: value });
    }, 280);
  }

  // ── Tickets List ───────────────────────────────────────────────────────────

  async function loadTickets(params = {}) {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const qs = new URLSearchParams(params).toString();
      const [tickets, stats] = await Promise.all([
        api('GET', `/api/tickets${qs ? '?' + qs : ''}`),
        api('GET', '/api/stats')
      ]);
      allTickets = tickets;
      renderTicketsList(tickets, stats, params);
    } catch (err) {
      content.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>${err.message}</p></div>`;
    }
  }

  function renderTicketsList(tickets, stats, params) {
    const activeFilter = params.status || 'All';
    const searchVal = params.search || '';

    const content = document.getElementById('content');
    content.innerHTML = `
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Total Tickets</div>
          <div class="stat-value white">${stats.total}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Open</div>
          <div class="stat-value blue">${stats.open}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">In Progress</div>
          <div class="stat-value amber">${stats.in_progress}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Resolved</div>
          <div class="stat-value green">${stats.closed}</div>
        </div>
      </div>

      <div class="page-header">
        <div>
          <div class="page-title">Support Tickets</div>
          <div class="page-subtitle">${tickets.length} ticket${tickets.length !== 1 ? 's' : ''} ${activeFilter !== 'All' ? `· ${activeFilter}` : ''} ${searchVal ? `· "${searchVal}"` : ''}</div>
        </div>
      </div>

      <div class="filter-bar">
        ${['All','Open','In Progress','Closed'].map(s =>
          `<button class="filter-btn ${activeFilter === s ? 'active' : ''}" onclick="setFilter('${s}')">${s}</button>`
        ).join('')}
      </div>

      <div class="table-wrap">
        ${tickets.length === 0 ? `
          <div class="empty">
            <div class="empty-icon">📭</div>
            <div class="empty-title">No tickets found</div>
            <p>Try adjusting your search or filter, or <a href="#" onclick="showView('new'); return false;" style="color:var(--accent)">create a new ticket</a>.</p>
          </div>
        ` : `
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Subject</th>
                <th>Status</th>
                <th class="hide-sm">Created</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${tickets.map(t => `
                <tr onclick="viewTicket('${t.ticket_id}')">
                  <td><span class="ticket-id">${t.ticket_id}</span></td>
                  <td>
                    <div class="customer-name">${esc(t.customer_name)}</div>
                    <div class="customer-email">${esc(t.customer_email)}</div>
                  </td>
                  <td class="subject-cell"><span class="subject-text">${esc(t.subject)}</span></td>
                  <td>${statusBadge(t.status)}</td>
                  <td class="hide-sm"><span class="date-text">${fmtDate(t.created_at)}</span></td>
                  <td>
                    <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); viewTicket('${t.ticket_id}')">View →</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `}
      </div>
    `;
  }

  function setFilter(status) {
    document.getElementById('searchInput').value = '';
    if (status === 'All') loadTickets();
    else loadTickets({ status });
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── New Ticket View ────────────────────────────────────────────────────────

  function renderNewTicketView() {
    document.getElementById('content').innerHTML = `
      <div style="max-width:600px">
        <div class="page-header">
          <div>
            <div class="page-title">Create New Ticket</div>
            <div class="page-subtitle">Fill in the customer details and issue description</div>
          </div>
          <button class="btn btn-ghost" onclick="showView('tickets')">← Back</button>
        </div>

        <div class="table-wrap" style="padding:28px">
          <div class="form-row form-group">
            <div>
              <label>Customer Name *</label>
              <input id="f_name" type="text" placeholder="Jane Smith" />
            </div>
            <div>
              <label>Customer Email *</label>
              <input id="f_email" type="email" placeholder="jane@example.com" />
            </div>
          </div>
          <div class="form-group">
            <label>Issue Subject *</label>
            <input id="f_subject" type="text" placeholder="Brief summary of the issue" />
          </div>
          <div class="form-group">
            <label>Description *</label>
            <textarea id="f_desc" rows="5" placeholder="Describe the issue in detail…"></textarea>
          </div>
          <div class="form-footer">
            <button class="btn btn-ghost" onclick="showView('tickets')">Cancel</button>
            <button class="btn btn-primary" onclick="submitNewTicket()">Create Ticket →</button>
          </div>
        </div>
      </div>
    `;
  }

  async function submitNewTicket() {
    const name = document.getElementById('f_name').value.trim();
    const email = document.getElementById('f_email').value.trim();
    const subject = document.getElementById('f_subject').value.trim();
    const desc = document.getElementById('f_desc').value.trim();

    if (!name || !email || !subject || !desc) {
      toast('All fields are required.', 'error'); return;
    }

    try {
      const result = await api('POST', '/api/tickets', {
        customer_name: name, customer_email: email, subject, description: desc
      });
      toast(`✓ Ticket ${result.ticket_id} created successfully!`);
      await viewTicket(result.ticket_id);
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ── Ticket Detail Modal ────────────────────────────────────────────────────

  async function viewTicket(ticketId) {
    openModal('Loading…', '<div class="loading"><div class="spinner"></div></div>');
    try {
      const t = await api('GET', `/api/tickets/${ticketId}`);
      document.getElementById('modalTitle').innerHTML = `
        <span style="font-family:'DM Mono',monospace;color:var(--accent);margin-right:10px">${t.ticket_id}</span>
        ${statusBadge(t.status)}
      `;
      document.getElementById('modalBody').innerHTML = renderTicketDetail(t);
    } catch (err) {
      document.getElementById('modalBody').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
    }
  }

  function renderTicketDetail(t) {
    const notesList = (t.notes || []).map(n => `
      <div class="note-item">
        <div class="note-text">${esc(n.note_text)}</div>
        <div class="note-meta">${fmtDate(n.created_at)}</div>
      </div>
    `).join('') || '<p style="color:var(--text-3);font-size:.8rem">No notes yet.</p>';

    return `
      <div class="detail-grid">
        <div class="detail-field">
          <div class="detail-label">Customer</div>
          <div class="detail-value">${esc(t.customer_name)}</div>
        </div>
        <div class="detail-field">
          <div class="detail-label">Email</div>
          <div class="detail-value">${esc(t.customer_email)}</div>
        </div>
        <div class="detail-field">
          <div class="detail-label">Ticket ID</div>
          <div class="detail-value mono">${t.ticket_id}</div>
        </div>
        <div class="detail-field">
          <div class="detail-label">Created</div>
          <div class="detail-value" style="font-size:.8rem">${fmtDate(t.created_at)}</div>
        </div>
        <div class="detail-field">
          <div class="detail-label">Last Updated</div>
          <div class="detail-value" style="font-size:.8rem">${fmtDate(t.updated_at)}</div>
        </div>
        <div class="detail-field">
          <div class="detail-label">Status</div>
          <div>${statusBadge(t.status)}</div>
        </div>
      </div>

      <div class="desc-block">
        <div class="detail-label">Subject</div>
        <div style="font-weight:600;margin-bottom:8px">${esc(t.subject)}</div>
        <div class="detail-label">Description</div>
        <div class="desc-text">${esc(t.description)}</div>
      </div>

      <div class="notes-section">
        <div class="notes-title">Agent Notes (${(t.notes||[]).length})</div>
        ${notesList}
      </div>

      <div class="update-form">
        <div class="update-title">Update Ticket</div>
        <div class="form-row" style="margin-bottom:12px">
          <div>
            <label>Change Status</label>
            <select id="upd_status">
              ${['Open','In Progress','Closed'].map(s =>
                `<option value="${s}" ${t.status===s?'selected':''}>${s}</option>`
              ).join('')}
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Add Note</label>
          <textarea id="upd_note" rows="3" placeholder="Enter agent note or update…"></textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:space-between">
          <button class="btn btn-danger btn-sm" onclick="deleteTicket('${t.ticket_id}')">🗑 Delete</button>
          <button class="btn btn-primary btn-sm" onclick="updateTicket('${t.ticket_id}')">Save Changes</button>
        </div>
      </div>
    `;
  }

  async function updateTicket(ticketId) {
    const status = document.getElementById('upd_status').value;
    const note = document.getElementById('upd_note').value.trim();
    try {
      await api('PUT', `/api/tickets/${ticketId}`, { status, note: note || undefined });
      toast('✓ Ticket updated');
      viewTicket(ticketId);
      // Refresh background list
      loadTicketsQuiet();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  async function deleteTicket(ticketId) {
    if (!confirm(`Delete ticket ${ticketId}? This cannot be undone.`)) return;
    try {
      await api('DELETE', `/api/tickets/${ticketId}`);
      toast(`Ticket ${ticketId} deleted`);
      closeModal();
      loadTickets();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  async function loadTicketsQuiet() {
    try {
      const [tickets, stats] = await Promise.all([
        api('GET', '/api/tickets'),
        api('GET', '/api/stats')
      ]);
      allTickets = tickets;
    } catch {}
  }

  // ── Modal Helpers ──────────────────────────────────────────────────────────

  function openModal(title, body) {
    document.getElementById('modalTitle').innerHTML = title;
    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('modalOverlay').style.display = 'flex';
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').style.display = 'none';
    loadTickets();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.getElementById('modalOverlay').style.display = 'none';
      loadTickets();
    }
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  loadTickets();
</script>
</body>
</html>
